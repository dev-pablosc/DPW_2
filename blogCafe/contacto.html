<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>
    <!-- Normmalize -->
    <link rel="stylesheet" href="./css/normalize.css" />
    <!-- fonts "Happy Monkey", system-ui; -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
    <!-- fonts Zalando Sans Expanded - Titulos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="header">

      <div class="contenedor">
        <div class="barra">
          <a href="index.html" class="logo"><h1 class="logo__titulo no-margin centrar-texto">Blog<span class="logo__bold">DeCafé</span> </h1></a>       
          
          <nav class="navegacion centrar-texto">
            <a href="nosotros.html" class="navegacion__enlaces">Nosotros</a>
            <a href="cursos.html" class="navegacion__enlaces">Cursos</a>
            <a href="contacto.html" class="navegacion__enlaces">Contacto</a>
          </nav>
        </div>
      </div> <!--.contenedor-->

      <div class="header__titulo">
        <h2 class="no-margin">Blog de Café</h2>
        <p class="no-margin">Aprende de los expertos con las mejores recetas y consejos</p>
      </div>
    </header>

    <main class="contenedor">
      <h3 class="centrar-texto">Contacto </h3>

      <div class="contacto-bg"></div>

      <form class="formulario">
        <div class="campo">
          <label class="campo__label" for="nombre">Nombre</label>
          <input class="campo__inp" type="text" placeholder="Tu nombre" id="nombre">
        </div>
        <div class="campo">
          <label class="campo__label" for="email">Email</label>
          <input class="campo__inp" type="email" placeholder="Tu correo" id="email">
        </div>
        <div class="campo">
          <label class="campo__label" for="mensaje">Mensaje</label>
          <textarea class="campo__inp campo__textarea" id="mensaje"></textarea>
        </div>
        <div class="campo">
          <button type="submit" class="btn btn--primario btn-form">Enviar</button>
        </div>
      </form>

    </main>
    <footer>
      <div class="footer">
        <div class="contenedor">
          <div class="barra">
            <a href="index.html" class="logo"><h1 class="logo__titulo no-margin centrar-texto">Blog<span class="logo__bold">DeCafé</span> </h1></a>       
            
            <nav class="navegacion centrar-texto">
              <a href="nosotros.html" class="navegacion__enlaces">Nosotros</a>
              <a href="cursos.html" class="navegacion__enlaces">Cursos</a>
              <a href="contacto.html" class="navegacion__enlaces">Contacto</a>
            </nav>
          </div>
        </div>
      </div>      
    </footer>
    <script src="./js/modernizr.js"></script>
  </body>
</html>

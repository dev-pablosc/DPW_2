  <main>
    <section>
      <h1>Ponte en Contacto</h1>
      <p>¿Tienes alguna consulta sobre los cursos, proyectos de desarrollo web o auditorías de ciberseguridad? Puedes
        escribirme directamente a través del siguiente formulario:</p>
    </section>

    <section>
      <!-- Formulario -->
      <form action="#" method="POST">
        <div>
          <label for="nombre">Nombre Completo:</label>
          <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
        </div>

        <div>
          <label for="email">Correo Electrónico:</label>
          <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
        </div>

        <div>
          <label for="asunto">Asunto:</label>
          <input type="text" id="asunto" name="asunto" placeholder="Motivo del mensaje">
        </div>

        <div>
          <label for="mensaje">Mensaje:</label>
          <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..."></textarea>
        </div>

        <div>
          <button type="submit">Enviar Formulario</button>
        </div>
      </form>

    </section>
  </main>

  <footer>
    <p>&copy; 2026 Pablo Sanchez | Sucre, Bolivia</p>
